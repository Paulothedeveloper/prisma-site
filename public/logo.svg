<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- fundo vidro escuro -->
    <linearGradient id="bg" x1="0.18" y1="0" x2="0.82" y2="1">
      <stop offset="0" stop-color="#26262E"/>
      <stop offset="0.55" stop-color="#17171B"/>
      <stop offset="1" stop-color="#0C0C0F"/>
    </linearGradient>
    <!-- brilho frio no topo-esquerda (entrada da luz) -->
    <radialGradient id="glowIn" cx="0.28" cy="0.30" r="0.55">
      <stop offset="0" stop-color="#9FB4FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#9FB4FF" stop-opacity="0"/>
    </radialGradient>
    <!-- eco prismático quente no canto inferior-direito -->
    <radialGradient id="glowOut" cx="0.80" cy="0.74" r="0.6">
      <stop offset="0" stop-color="#FF7AB0" stop-opacity="0.20"/>
      <stop offset="0.5" stop-color="#7A9BFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7A9BFF" stop-opacity="0"/>
    </radialGradient>
    <!-- gloss superior (liquid glass) -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="0.32" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- vidro do prisma -->
    <linearGradient id="glass" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.26"/>
      <stop offset="0.5" stop-color="#CFE0FF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7FA0E0" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="rayGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- base -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="url(#glowIn)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="url(#glowOut)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="url(#gloss)"/>
  <!-- rim de vidro -->
  <rect x="3" y="3" width="1018" height="1018" rx="226" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>

  <!-- feixe branco de entrada (com glow) -->
  <g filter="url(#rayGlow)">
    <path d="M126 420 L399 504" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" opacity="0.95"/>
  </g>

  <!-- espectro refratado (leque saindo da face direita) -->
  <g stroke-width="20" stroke-linecap="round" filter="url(#rayGlow)">
    <path d="M625 504 L906 452" stroke="#FF453A"/>
    <path d="M625 504 L913 500" stroke="#FF9F0A"/>
    <path d="M625 504 L913 553" stroke="#FFD60A"/>
    <path d="M625 504 L906 607" stroke="#30D158"/>
    <path d="M625 504 L890 663" stroke="#40C8E0"/>
    <path d="M625 504 L868 717" stroke="#0A84FF"/>
    <path d="M625 504 L843 767" stroke="#BF5AF2"/>
  </g>

  <!-- prisma (triângulo de vidro) -->
  <path d="M512 250 L694 660 L330 660 Z" fill="url(#glass)"
        stroke="#FFFFFF" stroke-width="16" stroke-linejoin="round"/>
  <!-- facet highlight (aresta esquerda iluminada) -->
  <path d="M512 250 L330 660" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
  <!-- linha de refração interna sutil -->
  <path d="M399 504 L625 504" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" opacity="0.35"/>
</svg>
